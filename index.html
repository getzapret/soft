<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zapret_Discord_YouTube_1.9.9d</title>
<style>
  :root{
    --bg-0:#0a0a0b;
    --bg-1:#121214;
    --line:rgba(255,255,255,0.08);
    --glass:rgba(255,255,255,0.06);
    --glass-strong:rgba(255,255,255,0.10);
    --text-hi:#f5f5f7;
    --text-lo:#8a8a92;
    --accent:#ffffff;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04), transparent 45%),
      var(--bg-0);
    color:var(--text-hi);
    overflow:hidden;
    position:relative;
  }

  /* фоновые блики для эффекта стекла */
  .orb{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.5;
    pointer-events:none;
  }
  .orb-1{
    width:420px;height:420px;
    background:rgba(255,255,255,0.10);
    top:-120px; left:-100px;
  }
  .orb-2{
    width:380px;height:380px;
    background:rgba(255,255,255,0.06);
    bottom:-140px; right:-100px;
  }

  .card{
    position:relative;
    z-index:2;
    width:380px;
    padding:40px 32px 32px;
    border-radius:28px;
    text-align:center;
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(150%);
    -webkit-backdrop-filter:blur(24px) saturate(150%);
    border:1px solid var(--line);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.08);
    animation:rise 0.7s cubic-bezier(.2,.9,.25,1) both;
  }

  @keyframes rise{
    from{opacity:0; transform:translateY(18px) scale(0.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }

  .icon-wrap{
    width:88px;
    height:88px;
    margin:0 auto 22px;
    border-radius:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03));
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:
      0 6px 20px rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .icon-wrap svg{
    width:44px;
    height:44px;
  }

  .filename{
    font-size:15px;
    font-weight:600;
    letter-spacing:0.2px;
    color:var(--text-hi);
    word-break:break-word;
    line-height:1.4;
    margin-bottom:6px;
  }

  .meta{
    font-size:12px;
    color:var(--text-lo);
    margin-bottom:26px;
    letter-spacing:0.3px;
  }

  .download-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:14px 18px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.14);
    background:linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05));
    color:var(--text-hi);
    font-size:14.5px;
    font-weight:600;
    letter-spacing:0.2px;
    text-decoration:none;
    cursor:pointer;
    transition:transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    box-shadow:
      0 4px 14px rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .download-btn:hover{
    transform:translateY(-2px);
    background:linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.07));
    box-shadow:
      0 8px 22px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.2);
  }

  .download-btn:active{
    transform:translateY(0);
  }

  .download-btn svg{
    width:18px;height:18px;
    flex-shrink:0;
  }

  .footnote{
    margin-top:18px;
    font-size:11px;
    color:var(--text-lo);
    opacity:0.7;
  }
</style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="icon-wrap">
      <!-- ЗАМЕНИ ЭТОТ SVG НА СВОЮ ИКОНКУ (см. инструкцию в чате) -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L4 6V12C4 16.5 7.5 20.5 12 22C16.5 20.5 20 16.5 20 12V6L12 2Z"
              stroke="white" stroke-width="1.4" stroke-linejoin="round" fill="rgba(255,255,255,0.06)"/>
        <path d="M9 12L11 14L15.5 9.5" stroke="white" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="filename">Zapret_Discord_YouTube_1.9.9d</div>
    <div class="meta">Готово к установке</div>

    <!-- ⬇⬇⬇ СЮДА ВСТАВИТЬ ПРЯМУЮ ССЫЛКУ НА СКАЧИВАНИЕ ⬇⬇⬇ -->
    <a href="#" class="download-btn" id="downloadBtn">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3V15M12 15L7 10M12 15L17 10" stroke="white" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 18H20" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Скачать
    </a>

    <div class="footnote">Windows · x64</div>
  </div>

</body>
</html>
